# アプリの名前（英数字とハイフンのみ、小文字）
name = "bttf-report-app"

# 実行するメインのファイル
main = "server.ts"

# 互換性のための日付
compatibility_date = "2024-03-25"

# Node.jsの機能を使えるようにする設定（Wrangler v4以降の書き方）
compatibility_flags = [ "nodejs_compat" ]

# ここに環境変数を書きます
[vars]
GAS_URL = "https://script.google.com/macros/s/AKfycbyEJ7fv0MwKXxkRfuK9vLpNGs8wbfnYu6v3FhqqskU/exec"
